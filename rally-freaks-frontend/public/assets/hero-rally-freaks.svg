<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 720" role="img" aria-labelledby="title desc">
  <title id="title">Rally Freaks hero</title>
  <desc id="desc">Dark rally streaming hero art with RF logo, rally car and stylized driver.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020714"/>
      <stop offset="0.55" stop-color="#06142b"/>
      <stop offset="1" stop-color="#020711"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2bd4ff"/>
      <stop offset="0.55" stop-color="#0084ff"/>
      <stop offset="1" stop-color="#0041b9"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071428"/>
      <stop offset="0.5" stop-color="#0e376a"/>
      <stop offset="1" stop-color="#02050c"/>
    </linearGradient>
    <radialGradient id="light" cx="68%" cy="34%" r="55%">
      <stop offset="0" stop-color="#0f8cff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#0f8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity=".64"/>
    </filter>
  </defs>

  <rect width="1320" height="720" fill="url(#bg)"/>
  <rect width="1320" height="720" fill="url(#light)"/>
  <g opacity=".45">
    <path d="M-120 620C220 470 520 410 980 410" stroke="#006eff" stroke-width="9" opacity=".35" filter="url(#glow)"/>
    <path d="M300 100 40 630" stroke="#0a7fff" stroke-width="2" opacity=".22"/>
    <path d="M660 40 240 650" stroke="#2bd4ff" stroke-width="2" opacity=".12"/>
    <path d="M1130 70 690 690" stroke="#0a7fff" stroke-width="2" opacity=".18"/>
  </g>

  <g transform="translate(72 138)" filter="url(#glow)">
    <path d="M25 70h140" stroke="#005fe8" stroke-width="13" stroke-linecap="round" opacity=".42"/>
    <path d="M5 106h165" stroke="#148fff" stroke-width="12" stroke-linecap="round" opacity=".72"/>
    <path d="M35 145h132" stroke="#2bd4ff" stroke-width="9" stroke-linecap="round" opacity=".48"/>
    <circle cx="188" cy="110" r="96" fill="none" stroke="url(#blue)" stroke-width="12" opacity=".9"/>
    <path d="M126 66h122c37 0 50 29 31 53-12 15-33 22-64 22h-36l-14 41h-60l36-116z" fill="#f4f8ff"/>
