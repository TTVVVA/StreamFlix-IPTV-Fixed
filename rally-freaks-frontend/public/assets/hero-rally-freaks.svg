    <path d="M256 78h145l-27 52H228l28-52z" fill="#21d5ff"/>
  </g>

  <text x="78" y="468" fill="#f5f9ff" font-size="70" font-weight="900" font-family="Inter, Arial" letter-spacing="-4">RALLY</text>
  <text x="312" y="468" fill="#1498ff" font-size="70" font-weight="900" font-family="Inter, Arial" letter-spacing="-4">FREAKS</text>
  <text x="83" y="512" fill="#e8f3ff" font-size="21" font-weight="800" font-family="Inter, Arial" letter-spacing="8">AO VIVO. RALLY. SEM LIMITES.</text>

