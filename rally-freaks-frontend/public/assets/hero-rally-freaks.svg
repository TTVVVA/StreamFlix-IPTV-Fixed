    <text x="314" y="181" fill="#ffffff" font-size="29" font-weight="900" font-family="Inter, Arial">RALLY FREAKS</text>
    <text x="280" y="72" fill="#e8f8ff" font-size="22" font-weight="900" font-family="Inter, Arial">OGIER</text>
