<!DOCTYPE html>
<html>
<head>
    <title>Channel Loading Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h1>StreamFlix Channel Loading Test</h1>
    <button onclick="testLoad()">Test Load Channels</button>
    <div id="output" style="margin-top: 20px; font-family: monospace;"></div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(msg, color = 'black') {
            output.innerHTML += `<div style="color: ${color};">${msg}</div>`;
        }
        
        async function testLoad() {
            output.innerHTML = '';
            log('🔄 Starting test...', 'blue');
            
            const url = 'https://iptv-org.github.io/iptv/countries/in.m3u';
            log(`📡 Fetching: ${url}`, 'gray');
            
            try {
                const response = await fetch(url);
                log(`✅ Response Status: ${response.status}`, 'green');
                log(`📋 Content-Type: ${response.headers.get('content-type')}`, 'gray');
                
                const text = await response.text();
                log(`📄 Content Length: ${text.length} bytes`, 'blue');
                
                // Parse M3U
                const lines = text.split('\n');
                log(`📝 Total Lines: ${lines.length}`, 'blue');
                
                let channels = [];
                let currentChannel = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        const match = line.match(/#EXTINF:-1\s*(.*?)\s*,(.*)/);
                        if (match) {
                            currentChannel = {
                                name: match[2].trim(),
                                url: null
                            };
                        }
                    } else if (line.startsWith('http') && currentChannel) {
                        currentChannel.url = line;
                        channels.push(currentChannel);
                        currentChannel = null;
                    }
                }
                
                log(`✅ Parsed ${channels.length} channels`, 'green');
                
                // Show first 5
                log('\n📺 First 5 channels:', 'blue');
                channels.slice(0, 5).forEach((ch, i) => {
                    log(`${i+1}. ${ch.name}`, 'black');
                    log(`   ${ch.url.substring(0, 60)}...`, 'gray');
                });
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'red');
                console.error(error);
            }
        }
    </script>
</body>
</html>
